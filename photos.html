    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">PHOTOGRAPHY PORTFOLIO</a>
            <div class="collapse navbar-collapse" id="navbarNav">
               <ul class="navbar-nav ms-auto">
    <li class="nav-item">
        <a class="nav-link" href="index.html">🏠 Home</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="about.html">ℹ️ About</a>
    </li>
    <li class="nav-item">
        <a class="nav-link active" href="photos.html">📸 Photos</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="contact.html">📞 Contact</a>
    </li>
</ul>
            </div>
        </div>
    </nav>

    <section id="photos" class="bg-black bg-opacity-25">
        <div class="container">
            <h2 class="section-title">Photography Collections</h2>
            
            <div class="mb-5">
                <h3 class="mb-4 text-success"><i class="fas fa-leaf me-2"></i> Nature</h3>
                <div id="natureCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner" id="nature-api-images">
                        <!-- Loaded via Unsplash API -->
                    </div>
                </div>
            </div>

            <div class="mb-5">
                <h3 class="mb-4 text-warning"><i class="fas fa-paw me-2"></i> Wildlife</h3>
                <div id="wildlifeCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner" id="wildlife-api-images">
                        <!-- Loaded via Unsplash API -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Unsplash API Loader (Simple)
        function loadImages(category, targetId) {
            const container = document.getElementById(targetId);
            for(let i=1; i<=3; i++) {
                const activeClass = i === 1 ? 'active' : '';
                container.innerHTML += `
                    <div class="carousel-item ${activeClass}">
                        <img src="https://source.unsplash.com/featured/1200x450?${category}&sig=${i}" class="d-block w-100" alt="${category}">
                    </div>`;
            }
        }
        loadImages('nature', 'nature-api-images');
        loadImages('wildlife', 'wildlife-api-images');
    </script>
</body>
</html>
